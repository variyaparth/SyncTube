<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SyncTube Room</title>
    <link rel="preconnect" href="https://www.youtube.com" />
    <link rel="preconnect" href="https://s.ytimg.com" />
    <link rel="preconnect" href="https://i.ytimg.com" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body class="room-page">
    <header class="top-bar">
      <div>
        <p class="label">Room ID</p>
        <h1 id="room-id-display">------</h1>
      </div>
      <div class="top-bar-actions">
        <span id="host-status" class="pill">Viewer</span>
        <button id="copy-link-btn" type="button">Copy Invite Link</button>
      </div>
    </header>

    <main class="room-layout">
      <section class="video-panel card">
        <div class="video-controls">
          <label for="video-input">YouTube URL / Video ID</label>
          <div class="video-input-row">
            <input id="video-input" type="text" placeholder="Paste a YouTube link" />
            <button id="load-video-btn" type="button">Load Video</button>
          </div>
        </div>

        <div class="player-wrapper">
          <div id="player"></div>
          <div id="player-lock" class="player-lock hidden" aria-hidden="true"></div>
        </div>
      </section>

      <aside class="side-panel">
        <section class="card chat-card">
          <h2>Live Chat</h2>
          <div id="chat-messages" class="chat-messages"></div>
          <form id="chat-form" class="chat-form">
            <input id="chat-input" type="text" maxlength="400" placeholder="Type a message..." required />
            <button type="submit">Send</button>
          </form>
        </section>

        <section class="card users-card">
          <h2>Users</h2>
          <ul id="user-list"></ul>
        </section>
      </aside>
    </main>

    <script src="/socket.io/socket.io.js"></script>
    <script src="client.js"></script>
  </body>
</html>
